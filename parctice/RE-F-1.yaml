quiz_title: "Reading Explorer 1 Vocabulary Practice"
questions:
  - id: 1
    text: "The heavy rain had a negative _______ on the farmers' crops this year."
    options:
      - text: "effect"
        is_correct: true
        rationale: "在这个语境中，'effect' 表示某种原因导致的结果或影响，符合句意。"
      - text: "effort"
        is_correct: false
        rationale: "'Effort' 指的是身体或精神上的努力，无法描述天气对庄稼产生的结果。"
      - text: "affect"
        is_correct: false
        rationale: "'Affect' 通常作为动词使用，而此处冠词 'a' 后面需要接名词形式。"
      - text: "event"
        is_correct: false
        rationale: "'Event' 指发生的事情或活动，放在此处无法表达‘产生影响’的特定含义。"
    hint: "想想看，当一件事导致另一件事发生改变时，我们称这种“结果”为什么？"

  - id: 2
    text: "It is hard for me to study when loud music starts to _______ me from my work."
    options:
      - text: "motivate"
        is_correct: false
        rationale: "'Motivate' 是激励的意思，巨大的噪音通常不会让人更有动力去工作。"
      - text: "distract"
        is_correct: true
        rationale: "'Distract' 表示使某人分心，符合音乐干扰学习导致注意力转移的场景。"
      - text: "support"
        is_correct: false
        rationale: "'Support' 指支持或帮助，噪音通常被视为障碍而非支持。"
      - text: "protect"
        is_correct: false
        rationale: "'Protect' 指保护免受伤害，逻辑上不符合音乐对学习者的影响。"
    hint: "当你的注意力从重要的事情上移开时，发生了什么？"

  - id: 3
    text: "A good teacher knows how to _______ students to read more books for fun."
    options:
      - text: "distract"
        is_correct: false
        rationale: "老师的目标通常是让学生专心，而不是让他们分心去做别的事。"
      - text: "ignore"
        is_correct: false
        rationale: "'Ignore' 是忽略的意思，这与鼓励学生阅读的行为相反。"
      - text: "describe"
        is_correct: false
        rationale: "虽然可以描述书本，但句意更侧重于给予学生阅读的动力或热情。"
      - text: "motivate"
        is_correct: true
        rationale: "'Motivate' 意味着激发某人的动力或兴趣去做某事，符合教育者的角色。"
    hint: "哪个词表达了给某人“动力”或“理由”去做一件有益的事？"

  - id: 4
    text: "The weather _______ says it will be sunny tomorrow, so we can go to the park."
    options:
      - text: "forecast"
        is_correct: true
        rationale: "'Forecast' 专指对未来（尤其是天气）的预报。"
      - text: "financial"
        is_correct: false
        rationale: "'Financial' 指经济的，不能用来形容天气。"
      - text: "drought"
        is_correct: false
        rationale: "'Drought' 是干旱，是一个灾害名词，不是预报本身。"
      - text: "likely"
        is_correct: false
        rationale: "'Likely' 是形容词，通常不直接接在 weather 后面作宾语。"
    hint: "如果你想知道明天的天气，你会看什么？"

  - id: 5
    text: "The polar bear uses its white fur as _______ to hide in the snow."
    options:
      - text: "camouflage"
        is_correct: true
        rationale: "'Camouflage' 指伪装，生物利用它使自己与环境融合以躲避危险或捕猎。"
      - text: "communication"
        is_correct: false
        rationale: "'Communication' 指交流，白色的毛主要是为了隐藏而非说话。"
      - text: "texture"
        is_correct: false
        rationale: "'Texture' 指纹理，虽然毛有纹理，但此处强调的是‘隐藏’的功能。"
      - text: "movement"
        is_correct: false
        rationale: "'Movement' 指动作，白色的毛属于身体特征而非动作。"
    hint: "动物为了不被发现而把自己‘藏’在背景里的能力叫什么？"

  - id: 6
    text: "A hungry lion is a dangerous _______ that hunts other animals for food."
    options:
      - text: "assistant"
        is_correct: false
        rationale: "'Assistant' 指助手，狮子在捕猎时不是助手。"
      - text: "predator"
        is_correct: true
        rationale: "'Predator' 指捕食者，即通过捕食其他生物生存的动物。"
      - text: "creature"
        is_correct: false
        rationale: "虽然狮子是 creature（生物），但 'predator' 更能体现它‘捕猎’的特征。"
      - text: "organism"
        is_correct: false
        rationale: "'Organism' 通常指微小的有机体，不适合描述狮子。"
    hint: "吃肉的猎手在英语里怎么说？"

  - id: 7
    text: "The giant squid is a very _______ animal because people rarely see it."
    options:
      - text: "ordinary"
        is_correct: false
        rationale: "'Ordinary' 指平常的，但巨型乌贼非常少见。"
      - text: "unusual"
        is_correct: true
        rationale: "'Unusual' 指不寻常的、罕见的，符合‘很少见到’的描述。"
      - text: "simple"
        is_correct: false
        rationale: "'Simple' 指简单的，巨型乌贼的构造和习性并不简单。"
      - text: "daily"
        is_correct: false
        rationale: "'Daily' 指每日的，不符合句意。"
    hint: "如果一个东西很难见到，你会觉得它很‘普通’还是‘特别’？"

  - id: 8
    text: "Many people _______ the factory for polluting the local river."
    options:
      - text: "blame"
        is_correct: true
        rationale: "'Blame' 指谴责或把责任归咎于某人，符合对污染行为的反应。"
      - text: "deliver"
        is_correct: false
        rationale: "'Deliver' 是递送，不能表达谴责的意思。"
      - text: "assist"
        is_correct: false
        rationale: "'Assist' 是协助，人们不会协助工厂污染河流。"
      - text: "replace"
        is_correct: false
        rationale: "'Replace' 是替代，不符合逻辑。"
    hint: "当一件事做错时，你会指责谁？"

  - id: 9
    text: "It is very _______ that the price of oil will increase next month."
    options:
      - text: "likely"
        is_correct: true
        rationale: "'Likely' 表示‘可能的’，常用于对未来趋势的推测。"
      - text: "past"
        is_correct: false
        rationale: "'Past' 指过去，不能描述未来的可能性。"
      - text: "odd"
        is_correct: false
        rationale: "'Odd' 指古怪的，不符合描述价格上涨趋势的常用表达。"
      - text: "immediate"
        is_correct: false
        rationale: "'Immediate' 是立刻的，但通常不用来修饰 'It is... that' 结构表达可能性。"
    hint: "如果你觉得一件事有很大机会发生，你会用哪个词？"

  - id: 10
    text: "The _______ for our summer holiday is a small island in the Pacific."
    options:
      - text: "destination"
        is_correct: true
        rationale: "'Destination' 指目的地，即旅行要去的地方。"
      - text: "factory"
        is_correct: false
        rationale: "'Factory' 是工厂，人们通常不去工厂度假。"
      - text: "source"
        is_correct: false
        rationale: "'Source' 是来源，不符合旅行地点的语境。"
      - text: "fridge"
        is_correct: false
        rationale: "'Fridge' 是冰箱，完全无关。"
    hint: "旅行的终点站叫什么？"

  - id: 11
    text: "Farmers are worried because the long _______ has dried up all the water."
    options:
      - text: "flood"
        is_correct: false
        rationale: "'Flood' 是洪水，洪水会导致水太多，而不是干涸。"
      - text: "drought"
        is_correct: true
        rationale: "'Drought' 指干旱，即长期降雨不足导致缺水。"
      - text: "forecast"
        is_correct: false
        rationale: "'Forecast' 是预报，预报本身不会让水干涸。"
      - text: "financial"
        is_correct: false
        rationale: "'Financial' 是金融，与自然界水干涸无关。"
    hint: "很久不下雨导致土地裂开的情况叫什么？"

  - id: 12
    text: "If you want to finish your work on time, you should _______ on it."
    options:
      - text: "ignore"
        is_correct: false
        rationale: "'Ignore' 是忽略，忽略工作会导致无法完成。"
      - text: "concentrate"
        is_correct: true
        rationale: "'Concentrate' 指专心、集中注意力。"
      - text: "distract"
        is_correct: false
        rationale: "'Distract' 是分心，分心会降低效率。"
      - text: "motivate"
        is_correct: false
        rationale: "虽然需要动力，但句子强调的是‘当下的专注’。"
    hint: "当你全神贯注做一件事时，你在干什么？"

  - id: 13
    text: "The Internet is a very _______ tool for finding information quickly."
    options:
      - text: "powerful"
        is_correct: true
        rationale: "'Powerful' 在这里形容工具‘功能强大’。"
      - text: "spiky"
        is_correct: false
        rationale: "'Spiky' 指尖锐的，互联网不是尖锐的。"
      - text: "weird"
        is_correct: false
        rationale: "'Weird' 指奇怪，虽然网上有奇怪的东西，但此处强调整体功能。"
      - text: "odd"
        is_correct: false
        rationale: "'Odd' 也是奇怪的意思。"
    hint: "如果一个东西非常有力量或非常有效，我们可以说它很 _______。"

  - id: 14
    text: "Ancient people told a _______ about a monster living in the mountain."
    options:
      - text: "tale"
        is_correct: true
        rationale: "'Tale' 指传说或故事，常用于描述古老或神奇的事迹。"
      - text: "detail"
        is_correct: false
        rationale: "'Detail' 指细节，不符合语境。"
      - text: "research"
        is_correct: false
        rationale: "古代人通常不进行科学 'research'（研究）。"
      - text: "sequence"
        is_correct: false
        rationale: "'Sequence' 指顺序，不符合句意。"
    hint: "奶奶讲的故事或者古老的传说在英语里叫什么？"

  - id: 15
    text: "In many cultures, a wedding is a very special _______."
    options:
      - text: "ceremony"
        is_correct: true
        rationale: "'Ceremony' 指仪式，婚礼是一种重要的社会仪式。"
      - text: "injury"
        is_correct: false
        rationale: "'Injury' 是伤害，婚礼不是伤害。"
      - text: "factory"
        is_correct: false
        rationale: "'Factory' 是工厂。"
      - text: "fridge"
        is_correct: false
        rationale: "'Fridge' 是冰箱。"
    hint: "正式的庆祝活动或者‘礼’在英语中叫什么？"

  - id: 16
    text: "Scientists use a _______ to study things that are too small to see."
    options:
      - text: "method"
        is_correct: true
        rationale: "'Method' 指方法，科学研究需要正确的方法。"
      - text: "fridge"
        is_correct: false
        rationale: "冰箱是存食物的。"
      - text: "jaw"
        is_correct: false
        rationale: "下颚是脸的一部分。"
      - text: "camouflage"
        is_correct: false
        rationale: "伪装是用来躲藏的。"
    hint: "做一件事的一套‘流程’或者‘手段’叫什么？"

  - id: 17
    text: "Modern robots can _______ difficult tasks in many car factories."
    options:
      - text: "operate"
        is_correct: false
        rationale: "'Operate' 通常指人操作机器，或者机器运转。但此处 'handle' 更贴切。"
      - text: "handle"
        is_correct: true
        rationale: "'Handle' 指处理、应付，符合机器人应付复杂任务的语境。"
      - text: "reflect"
        is_correct: false
        rationale: "'Reflect' 是反射，机器人不是在反射任务。"
      - text: "assist"
        is_correct: false
        rationale: "虽然可以协助，但直接接任务对象时用 handle 更好。"
    hint: "当你能‘搞定’一个困难的工作时，你在做什么？"

  - id: 18
    text: "The ocean _______ is home to millions of small plants and animals."
    options:
      - text: "society"
        is_correct: false
        rationale: "海洋生物没有人类意义上的‘社会’。"
      - text: "surrounding"
        is_correct: false
        rationale: "'Surrounding' 指周围的环境，此处需要一个指代生态系统的词。"
      - text: "coral"
        is_correct: true
        rationale: "'Coral'（珊瑚）是海洋生态的重要组成部分，是许多生物的家。"
      - text: "media"
        is_correct: false
        rationale: "'Media' 是媒体。"
    hint: "海底五颜六色的、像石头一样的生物叫什么？"

  - id: 19
    text: "It is important to be _______ when you meet someone for the first time."
    options:
      - text: "polite"
        is_correct: true
        rationale: "'Polite' 指有礼貌的，是初次见面时的基本要求。"
      - text: "strange"
        is_correct: false
        rationale: "初次见面不应该‘奇怪’。"
      - text: "odd"
        is_correct: false
        rationale: "‘古怪’也不合适。"
      - text: "likely"
        is_correct: false
        rationale: "‘可能的’逻辑不通。"
    hint: "如果你很有修养，别人会觉得你很 _______。"

  - id: 20
    text: "The new car _______ was very simple and easy to understand."
    options:
      - text: "design"
        is_correct: true
        rationale: "'Design' 指设计，指产品的外观或结构。"
      - text: "drought"
        is_correct: false
        rationale: "汽车没有‘干旱’。"
      - text: "destination"
        is_correct: false
        rationale: "汽车的设计不是它的目的地。"
      - text: "ceremony"
        is_correct: false
        rationale: "汽车的仪式不符合句意。"
    hint: "一个产品的外观和功能构思叫什么？"

  - id: 21
    text: "Drinking too much coffee might _______ your sleep tonight."
    options:
      - text: "affect"
        is_correct: true
        rationale: "'Affect' 作为动词，表示‘影响’。"
      - text: "effect"
        is_correct: false
        rationale: "此处需要动词，'Effect' 主要是名词。"
      - text: "effort"
        is_correct: false
        rationale: "努力不符合语境。"
      - text: "event"
        is_correct: false
        rationale: "事件不符合语境。"
    hint: "这是一个动词，表示‘产生改变’。"

  - id: 22
    text: "The moon _______ the light from the sun back to Earth."
    options:
      - text: "reflects"
        is_correct: true
        rationale: "'Reflect' 指反射，月球本身不发光，是反射阳光。"
      - text: "identifies"
        is_correct: false
        rationale: "月球不识别阳光。"
      - text: "establishes"
        is_correct: false
        rationale: "月球不创立阳光。"
      - text: "maintains"
        is_correct: false
        rationale: "月球不维持阳光。"
    hint: "光线碰到镜子或者水面跳回来的动作叫什么？"

  - id: 23
    text: "In the desert, animals have found _______ ways to stay cool."
    options:
      - text: "incredible"
        is_correct: true
        rationale: "'Incredible' 指难以置信的、极好的，形容生存方式的奇妙。"
      - text: "financial"
        is_correct: false
        rationale: "动物没有经济方式。"
      - text: "daily"
        is_correct: false
        rationale: "虽然是每天，但此处强调整体方法的巧妙。"
      - text: "simple"
        is_correct: false
        rationale: "有些方式非常复杂，用 'incredible' 更能体现生物的智慧。"
    hint: "如果你看到一个让你惊叹‘哇’的事情，你会用哪个词？"

  - id: 24
    text: "Computers are _______ to help us work much faster than before."
    options:
      - text: "able"
        is_correct: true
        rationale: "be able to 指‘能够’。"
      - text: "likely"
        is_correct: false
        rationale: "虽然可能，但句意更强调能力。"
      - text: "odd"
        is_correct: false
        rationale: "不符合逻辑。"
      - text: "past"
        is_correct: false
        rationale: "不符合逻辑。"
    hint: "‘能够做某事’的固定词组是什么？"

  - id: 25
    text: "We need to _______ the source of the problem before we can fix it."
    options:
      - text: "identify"
        is_correct: true
        rationale: "'Identify' 指识别、确定，符合‘找准问题根源’的语境。"
      - text: "ignore"
        is_correct: false
        rationale: "修理前不能忽略问题。"
      - text: "distract"
        is_correct: false
        rationale: "不符合句意。"
      - text: "motivate"
        is_correct: false
        rationale: "不符合句意。"
    hint: "如果你在人群中‘认出’了你的朋友，你就是在 _______ 他。"

  - id: 26
    text: "Despite the bad weather, the ship continued its _______ across the sea."
    options:
      - text: "journey"
        is_correct: true
        rationale: "'Journey' 指旅程，通常指较长时间或长距离的旅行。"
      - text: "factory"
        is_correct: false
        rationale: "工厂不能在海上走。"
      - text: "jaw"
        is_correct: false
        rationale: "不符合语境。"
      - text: "pattern"
        is_correct: false
        rationale: "不符合语境。"
    hint: "从一个地方去到另一个地方的漫长过程叫什么？"

  - id: 27
    text: "Exercise can _______ your energy and make you feel much better."
    options:
      - text: "boost"
        is_correct: true
        rationale: "'Boost' 指提升、增强，常用于能量、情绪或经济的增长。"
      - text: "blame"
        is_correct: false
        rationale: "运动不会责备能量。"
      - text: "ignore"
        is_correct: false
        rationale: "不符合句意。"
      - text: "settle"
        is_correct: false
        rationale: "不符合句意。"
    hint: "如果你想让某样东西‘更上一层楼’，你在做什么？"

  - id: 28
    text: "The tiger is a powerful _______ that many other animals fear."
    options:
      - text: "creature"
        is_correct: true
        rationale: "'Creature' 指生物，常用来描述自然界中的动物。"
      - text: "society"
        is_correct: false
        rationale: "老虎不是社会。"
      - text: "media"
        is_correct: false
        rationale: "老虎不是媒体。"
      - text: "source"
        is_correct: false
        rationale: "老虎不是来源。"
    hint: "大自然中所有‘活着的东西’都可以被称为 _______。"

  - id: 29
    text: "It is a _______ for many families to eat dinner together every evening."
    options:
      - text: "tradition"
        is_correct: true
        rationale: "'Tradition' 指传统或习惯，描述一种长期坚持的行为方式。"
      - text: "injury"
        is_correct: false
        rationale: "吃晚饭不是伤害。"
      - text: "drought"
        is_correct: false
        rationale: "吃晚饭不是干旱。"
      - text: "forecast"
        is_correct: false
        rationale: "吃晚饭不是预报。"
    hint: "如果一个习俗传了很多年，它就是一种 _______。"

  - id: 30
    text: "The police are looking for more _______ about the car accident."
    options:
      - text: "details"
        is_correct: true
        rationale: "'Details' 指细节、详情，符合调查需要的信息特征。"
      - text: "fridges"
        is_correct: false
        rationale: "警察不找冰箱。"
      - text: "jaws"
        is_correct: false
        rationale: "警察不找下颚。"
      - text: "factories"
        is_correct: false
        rationale: "除非事故在工厂，否则不需要找很多工厂。"
    hint: "如果你想知道一件事的所有‘小地方’，你在寻找 _______。"

  - id: 31
    text: "Technology _______ very quickly, so we must keep learning new things."
    options:
      - text: "advances"
        is_correct: true
        rationale: "'Advance' 指进步、前进，常用于形容技术或社会的发展。"
      - text: "blames"
        is_correct: false
        rationale: "技术不会责备。"
      - text: "ignores"
        is_correct: false
        rationale: "不符合句意。"
      - text: "exists"
        is_correct: false
        rationale: "虽然存在，但 'advances' 更能体现‘快’。"
    hint: "如果一个东西变得越来越先进，它就是在 _______。"

  - id: 32
    text: "Many people move to the city in search of a better _______."
    options:
      - text: "financial"
        is_correct: false
        rationale: "需要名词，'Financial' 是形容词。"
      - text: "situation"
        is_correct: true
