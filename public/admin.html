<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Vocabulary Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <header class="admin-header">
    <div class="header-container">
      <h1>Vocabulary Service Admin</h1>
      <div>
        <a href="/" target="_blank" class="btn btn-outline btn-sm">Student App</a>
        <button class="btn btn-secondary btn-sm" id="btn-admin-logout" style="margin-left: 0.5rem;">Logout</button>
      </div>
    </div>
  </header>

  <main class="admin-container">
    
    <section class="card">
      <div class="card-header">
        <h2>Admin Settings</h2>
      </div>
      <div class="card-body">
        <form id="change-pwd-form" style="display: flex; gap: 0.5rem;">
          <input type="password" id="new-admin-pwd" placeholder="New Admin Password" required class="form-select">
          <button type="submit" class="btn btn-primary btn-sm">Change Password</button>
        </form>
        <p class="status-msg" id="pwd-status"></p>
      </div>
    </section>

    <!-- Upload Section -->
    <section class="card">
      <div class="card-header">
        <h2>Upload New Quiz (YAML)</h2>
      </div>
      <div class="card-body">
        <form id="upload-form" class="upload-form">
          <input type="file" id="quiz-file" accept=".yaml,.yml" required>
          <button type="submit" class="btn btn-primary" id="btn-upload">Upload YAML</button>
        </form>
        <p class="status-msg" id="upload-status"></p>
      </div>
    </section>

    <!-- Settings Section -->
    <section class="card">
      <div class="card-header">
        <h2>Manage Quizzes</h2>
        <button class="btn btn-primary btn-sm" id="btn-save-active">Save Active Status</button>
      </div>
      <div class="card-body">
        <p class="status-msg" id="settings-status" style="margin-top: 0; margin-bottom: 1rem;"></p>
        <div id="quizzes-list" class="quizzes-list">
          <p>Loading quizzes...</p>
        </div>
      </div>
    </section>

    <!-- Allowed Students Section -->
    <section class="card">
      <div class="card-header">
        <h2>Allowed Students</h2>
      </div>
      <div class="card-body">
        <form id="add-student-form" style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
          <input type="text" id="new-student-name" placeholder="Student name" required class="form-select">
          <button type="submit" class="btn btn-primary btn-sm">Add</button>
        </form>
        <div id="students-list" class="quizzes-list">
          <p>Loading students...</p>
        </div>
      </div>
    </section>

    <!-- Scores Section -->
    <section class="card">
      <div class="card-header">
        <h2>History & Review</h2>
        <button class="btn btn-secondary btn-sm" id="btn-refresh-scores">Refresh</button>
      </div>
      <div class="card-body table-responsive">
        <table class="scores-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Student</th>
              <th>Quiz</th>
              <th>Score</th>
              <th>Acc</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="scores-tbody">
            <tr><td colspan="6" class="text-center">Loading scores...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="js/admin.js"></script>
</body>
</html>
